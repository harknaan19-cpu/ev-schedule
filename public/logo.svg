<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Connected Grid: 4 rounded squares representing community units -->
  <!-- Top-left -->
  <rect x="6" y="6" width="23" height="23" rx="5" fill="#0f172a"/>
  <!-- Top-right -->
  <rect x="35" y="6" width="23" height="23" rx="5" fill="#0f172a"/>
  <!-- Bottom-left -->
  <rect x="6" y="35" width="23" height="23" rx="5" fill="#0f172a"/>
  <!-- Bottom-right (accent — the unique unit) -->
  <rect x="35" y="35" width="23" height="23" rx="5" fill="#0ea5e9"/>
</svg>
