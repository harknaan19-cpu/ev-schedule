<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark fill -->
  <circle cx="32" cy="32" r="31" fill="#0f1117"/>
  <!-- Outer thick ring -->
  <circle cx="32" cy="32" r="28" stroke="#E53E3E" stroke-width="2.5" fill="none"/>
  <!-- Inner thin ring -->
  <circle cx="32" cy="32" r="24" stroke="#E53E3E" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Accent dot top -->
  <circle cx="32" cy="6" r="2" fill="#E53E3E"/>
  <!-- Bold 19 -->
  <text x="32" y="41" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="26" letter-spacing="-1" fill="#E53E3E">19</text>
  <!-- Underline accent -->
  <line x1="22" y1="45" x2="42" y2="45" stroke="#E53E3E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
