<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>הר כנען 19</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#f0f4f8" id="meta-theme" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="./logo-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { assistant: ['Assistant', 'sans-serif'] },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/he.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');

      /* ── Base ── */
      body { font-family: 'Assistant', sans-serif; background: #f0f4f8; }
      html { background: #f0f4f8; }
      html.dark, html.dark body { background: #08090d; }

      .glass-bg {
        background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #f0f4f8 100%);
        min-height: 100vh;
      }
      .dark .glass-bg {
        background: linear-gradient(160deg, #08090d 0%, #111827 40%, #0c1220 70%, #08090d 100%);
      }

      /* ── Floating orbs ── */
      .glass-orbs::before,
      .glass-orbs::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        animation: floatOrb 20s ease-in-out infinite alternate;
      }
      .glass-orbs::before {
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(178,34,34,0.12), transparent 70%);
        top: -100px; right: -100px;
      }
      .glass-orbs::after {
        width: 350px; height: 350px;
        background: radial-gradient(circle, rgba(178,34,34,0.08), transparent 70%);
        bottom: 20%; left: -80px;
        animation-delay: -10s;
      }
      .dark .glass-orbs::before {
        background: radial-gradient(circle, rgba(178,34,34,0.15), transparent 70%);
        opacity: 0.6;
      }
      .dark .glass-orbs::after {
        background: radial-gradient(circle, rgba(120,40,80,0.1), transparent 70%);
        opacity: 0.5;
      }
      @keyframes floatOrb {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(40px, -30px) scale(1.1); }
      }

      /* ── Glass surfaces ── */
      .glass-card {
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.5);
        border-radius: 1.5rem;
      }
      .dark .glass-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
      }

      .glass-card-subtle {
        background: rgba(255,255,255,0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 1.25rem;
      }
      .dark .glass-card-subtle {
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.04);
        box-shadow: 0 2px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.03);
      }

      /* Header */
      .glass-header {
        background: transparent;
        border-bottom: none;
      }
      .dark .glass-header {
        background: transparent;
        border-bottom: none;
      }

      /* ── Inputs ── */
      .glass-input {
        background: rgba(255,255,255,0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 9999px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .glass-input:focus {
        border-color: rgba(178,34,34,0.35);
        box-shadow: 0 0 0 3px rgba(178,34,34,0.08);
      }
      .dark .glass-input {
        background: rgba(255,255,255,0.035);
        border: 1px solid rgba(255,255,255,0.06);
      }
      .dark .glass-input:focus {
        border-color: rgba(178,34,34,0.45);
        box-shadow: 0 0 0 3px rgba(178,34,34,0.1);
      }

      /* ── Buttons ── */
      .glass-btn {
        background: rgba(255,255,255,0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 9999px;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-btn:hover { background: rgba(255,255,255,0.7); transform: scale(1.02); }
      .glass-btn:active { transform: scale(0.97); transition-duration: 0.1s; }
      .dark .glass-btn {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
      }
      .dark .glass-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.02); }

      .glass-btn-primary {
        background: #B22222;
        color: white;
        border-radius: 9999px;
        border: none;
        box-shadow: none;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-btn-primary:hover { transform: scale(1.03); }
      .glass-btn-primary:active { transform: scale(0.97); transition-duration: 0.1s; }
      .dark .glass-btn-primary {
        box-shadow: 0 4px 20px rgba(178,34,34,0.3);
      }

      .glass-btn-danger {
        background: #B22222;
        color: white;
        border-radius: 9999px;
        border: none;
        box-shadow: none;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .glass-btn-danger:hover { transform: scale(1.03); }
      .glass-btn-danger:active { transform: scale(0.97); transition-duration: 0.1s; }

      /* FAB */
      .glass-fab {
        background: #B22222;
        border-radius: 9999px;
        box-shadow: none;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        border: none;
      }
      .glass-fab:hover { transform: scale(1.08); }
      .glass-fab:active { transform: scale(0.94); transition-duration: 0.1s; }
      .dark .glass-fab {
        box-shadow: 0 6px 28px rgba(178,34,34,0.4);
      }

      /* Tab active */
      .glass-tab-active {
        background: rgba(255,255,255,0.7);
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      }
      .dark .glass-tab-active {
        background: rgba(255,255,255,0.07);
        box-shadow: 0 2px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Pill badge */
      .glass-pill {
        background: rgba(255,255,255,0.4);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 9999px;
      }
      .dark .glass-pill {
        background: rgba(255,255,255,0.035);
        border: 1px solid rgba(255,255,255,0.05);
      }

      /* Delete button */
      .del-btn {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), color 0.2s ease;
      }
      .del-btn:hover { transform: scale(1.15); color: #B22222; }
      .del-btn:active { transform: scale(0.9); transition-duration: 0.08s; }

      /* Row hover */
      .row-hover {
        transition: background-color 0.3s ease;
      }
      .row-hover:hover { background-color: rgba(178,34,34,0.03); }
      .dark .row-hover:hover { background-color: rgba(178,34,34,0.06); }

      /* ── Animations ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translate3d(0, 18px, 0) scale3d(0.97, 0.97, 1); }
        to   { opacity: 1; transform: translate3d(0, 0, 0) scale3d(1, 1, 1); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale3d(0.88, 0.88, 1); }
        to   { opacity: 1; transform: scale3d(1, 1, 1); }
      }
      .a-fade-up  { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; will-change: transform, opacity; }
      .a-fade-in  { animation: fadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both; will-change: opacity; }
      .a-scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; will-change: transform, opacity; }
      .a-d1 { animation-delay: 50ms; }
      .a-d2 { animation-delay: 100ms; }
      .a-d3 { animation-delay: 150ms; }
      .a-d4 { animation-delay: 200ms; }
      .a-d5 { animation-delay: 250ms; }
      .a-d6 { animation-delay: 300ms; }
      .a-d7 { animation-delay: 350ms; }
      .a-d8 { animation-delay: 400ms; }
      .spring { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }

      /* ── Bell ring animation ── */
      @keyframes bellRing {
        0%   { transform: rotate(0deg); }
        10%  { transform: rotate(14deg); }
        20%  { transform: rotate(-12deg); }
        30%  { transform: rotate(10deg); }
        40%  { transform: rotate(-8deg); }
        50%  { transform: rotate(6deg); }
        60%  { transform: rotate(-4deg); }
        70%  { transform: rotate(2deg); }
        80%  { transform: rotate(-1deg); }
        100% { transform: rotate(0deg); }
      }
      .bell-ring {
        animation: bellRing 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        transform-origin: top center;
      }

      /* ── Flatpickr ── */
      .flatpickr-calendar, .flatpickr-calendar *, .flatpickr-days, .dayContainer { box-sizing: border-box !important; }
      .flatpickr-calendar {
        font-family: 'Assistant', sans-serif;
        border-radius: 1.5rem !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1) !important;
        border: 1px solid rgba(255,255,255,0.4) !important;
        padding: 4px !important;
        background: rgba(255,255,255,0.85) !important;
        backdrop-filter: blur(16px) !important;
        margin-top: 4px;
        width: 290px !important;
        font-size: 13px !important;
      }
      .flatpickr-innerContainer { width: 100% !important; display: flex !important; justify-content: center !important; }
      .flatpickr-rContainer { width: 280px !important; display: flex !important; flex-direction: column !important; align-items: center !important; }
      .flatpickr-days, .dayContainer { width: 280px !important; min-width: 280px !important; max-width: 280px !important; height: auto !important; min-height: 0 !important; justify-content: flex-start !important; }
      @media (min-width: 640px) {
        .flatpickr-calendar { padding: 0.75rem !important; width: 315px !important; font-size: 14px !important; }
        .flatpickr-days, .dayContainer { width: 300px !important; min-width: 300px !important; max-width: 300px !important; }
      }
      .dark .flatpickr-calendar {
        background: rgba(15,17,25,0.97) !important;
        border: 1px solid rgba(255,255,255,0.06) !important;
        box-shadow: 0 12px 48px rgba(0,0,0,0.5) !important;
      }
      .flatpickr-day { max-width: 36px !important; height: 36px !important; line-height: 36px !important; border-radius: 50% !important; margin: 2px !important; }
      @media (min-width: 640px) { .flatpickr-day { max-width: 39px !important; height: 39px !important; line-height: 39px !important; } }
      .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange {
        background: #B22222 !important; border-color: #B22222 !important; color: #fff !important;
      }
      .dark .flatpickr-day.selected { background: #B22222 !important; border-color: #B22222 !important; }
      .flatpickr-day:hover { background: rgba(178,34,34,0.1) !important; }
      .dark .flatpickr-day:not(.flatpickr-disabled):hover { background: rgba(178,34,34,0.15) !important; }
      .dark .flatpickr-day:not(.flatpickr-disabled), .dark .flatpickr-weekday, .dark .flatpickr-month, .dark .flatpickr-current-month, .dark .flatpickr-monthDropdown-months { color: #e2e8f0 !important; }
      .dark .flatpickr-day.flatpickr-disabled { color: rgba(255,255,255,0.15) !important; }
      .dark .flatpickr-prev-month, .dark .flatpickr-next-month { fill: #e2e8f0 !important; }
      .flatpickr-time { border-top: 1px solid rgba(0,0,0,0.06) !important; margin-top: 0.25rem !important; height: 35px !important; line-height: 35px !important; }
      @media (min-width: 640px) { .flatpickr-time { height: 40px !important; line-height: 40px !important; margin-top: 0.5rem !important; } }
      .dark .flatpickr-time { border-top-color: rgba(255,255,255,0.06) !important; }
      .dark .flatpickr-time input, .dark .flatpickr-time .flatpickr-am-pm { color: #e2e8f0 !important; }
      .flatpickr-time input:hover, .flatpickr-time .flatpickr-am-pm:hover { background: rgba(178,34,34,0.08) !important; border-radius: 0.5rem !important; }
      .dark .flatpickr-time input:hover, .dark .flatpickr-time .flatpickr-am-pm:hover { background: rgba(178,34,34,0.12) !important; }
      .flatpickr-months .flatpickr-month { height: 30px !important; }
      @media (min-width: 640px) { .flatpickr-months .flatpickr-month { height: 35px !important; } }
      .flatpickr-innerContainer { margin-top: 2px; }
      @media (min-width: 640px) { .flatpickr-innerContainer { margin-top: 5px; } }
      .flatpickr-weekdayContainer { display: flex !important; justify-content: space-around !important; }
      .flatpickr-weekday { font-size: 11px !important; }
      .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { display: none !important; }
      input[type="time"] { -webkit-appearance: none; appearance: none; min-width: 0; }
      input[type="time"]::-webkit-date-and-time-value { text-align: center; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body class="transition-colors duration-200">
    <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');document.getElementById('meta-theme').setAttribute('content','#08090d')}</script>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
