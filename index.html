<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>הר כנען 19</title>
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#e0e5ec" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2a2d3e" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="./logo-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              assistant: ['Assistant', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/he.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
      body { font-family: 'Assistant', sans-serif; background: #e0e5ec; }
      .dark body, html.dark { background: #2a2d3e; }
      html { background: #e0e5ec; }
      html.dark { background: #2a2d3e; }

      /* ── Neumorphism base surfaces ── */
      .neu-bg {
        background: #e0e5ec;
        min-height: 100vh;
      }
      .dark .neu-bg {
        background: #2a2d3e;
      }

      /* Header — raised bottom edge */
      .neu-header {
        background: #e0e5ec;
        box-shadow: 0 4px 8px #b8bcc4;
      }
      .dark .neu-header {
        background: #2a2d3e;
        box-shadow: 0 4px 8px #181a2a;
      }

      /* Raised surface — extruded from background */
      .neu-raised {
        background: #e0e5ec;
        border-radius: 1.5rem;
        box-shadow: 5px 5px 10px #b8bcc4, -5px -5px 10px #f0f5fc;
      }
      .dark .neu-raised {
        background: #2a2d3e;
        box-shadow: 5px 5px 10px #1e2030, -5px -5px 10px #36394c;
      }

      /* Flat raised — subtler extrusion for smaller elements */
      .neu-flat {
        background: #e0e5ec;
        border-radius: 1rem;
        box-shadow: 3px 3px 8px #b8bcc4, -3px -3px 8px #f0f5fc;
      }
      .dark .neu-flat {
        background: #2a2d3e;
        box-shadow: 3px 3px 8px #1e2030, -3px -3px 8px #36394c;
      }

      /* Inset / pressed — for inputs, active states */
      .neu-inset {
        background: #e0e5ec;
        border-radius: 1rem;
        box-shadow: inset 2px 2px 5px #b8bcc4, inset -2px -2px 5px #f0f5fc;
        border: none;
      }
      .dark .neu-inset {
        background: #2a2d3e;
        box-shadow: inset 2px 2px 5px #1e2030, inset -2px -2px 5px #36394c;
      }

      /* Concave — deeper inset for active buttons */
      .neu-concave {
        background: linear-gradient(145deg, #d1d6de, #eaf0f8);
        border-radius: 1rem;
        box-shadow: inset 2px 2px 4px #b8bcc4, inset -2px -2px 4px #f0f5fc;
      }
      .dark .neu-concave {
        background: linear-gradient(145deg, #232536, #313446);
        box-shadow: inset 2px 2px 4px #1e2030, inset -2px -2px 4px #36394c;
      }

      /* Convex — raised with gradient highlight */
      .neu-convex {
        background: linear-gradient(145deg, #eaf0f8, #d1d6de);
        border-radius: 1rem;
        box-shadow: 4px 4px 10px #b8bcc4, -4px -4px 10px #f0f5fc;
      }
      .dark .neu-convex {
        background: linear-gradient(145deg, #313446, #232536);
        box-shadow: 4px 4px 10px #1e2030, -4px -4px 10px #36394c;
      }

      /* ── Animations ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translate3d(0, 18px, 0) scale3d(0.97, 0.97, 1); }
        to   { opacity: 1; transform: translate3d(0, 0, 0) scale3d(1, 1, 1); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale3d(0.88, 0.88, 1); }
        to   { opacity: 1; transform: scale3d(1, 1, 1); }
      }
      .a-fade-up  { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; will-change: transform, opacity; }
      .a-fade-in  { animation: fadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both; will-change: opacity; }
      .a-scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; will-change: transform, opacity; }
      .a-d1 { animation-delay: 50ms; }
      .a-d2 { animation-delay: 100ms; }
      .a-d3 { animation-delay: 150ms; }
      .a-d4 { animation-delay: 200ms; }
      .a-d5 { animation-delay: 250ms; }
      .a-d6 { animation-delay: 300ms; }
      .a-d7 { animation-delay: 350ms; }
      .a-d8 { animation-delay: 400ms; }

      .spring { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }

      /* GPU acceleration for animated elements */
      .neu-hover, .neu-btn, .neu-btn-primary, .neu-btn-danger {
        will-change: transform;
        -webkit-transform: translateZ(0);
        transform: translateZ(0);
      }

      /* Hover: push down into surface */
      .neu-hover {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .neu-hover:hover {
        box-shadow: 2px 2px 5px #b8bcc4, -2px -2px 5px #f0f5fc;
        transform: scale(0.985);
      }
      .dark .neu-hover:hover {
        box-shadow: 2px 2px 5px #1e2030, -2px -2px 5px #36394c;
      }
      .neu-hover:active {
        box-shadow: inset 2px 2px 4px #b8bcc4, inset -2px -2px 4px #f0f5fc;
        transform: scale(0.97);
        transition-duration: 0.1s;
      }
      .dark .neu-hover:active {
        box-shadow: inset 2px 2px 4px #1e2030, inset -2px -2px 4px #36394c;
      }

      /* Button press — goes from raised to inset */
      .neu-btn {
        background: #e0e5ec;
        border-radius: 9999px;
        box-shadow: 3px 3px 8px #b8bcc4, -3px -3px 8px #f0f5fc;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        border: none;
      }
      .dark .neu-btn {
        background: #2a2d3e;
        box-shadow: 3px 3px 8px #1e2030, -3px -3px 8px #36394c;
      }
      .neu-btn:hover {
        box-shadow: 2px 2px 5px #b8bcc4, -2px -2px 5px #f0f5fc;
        transform: scale(1.02);
      }
      .dark .neu-btn:hover {
        box-shadow: 2px 2px 5px #1e2030, -2px -2px 5px #36394c;
      }
      .neu-btn:active {
        box-shadow: inset 2px 2px 5px #b8bcc4, inset -2px -2px 5px #f0f5fc;
        transform: scale(0.97);
        transition-duration: 0.1s;
      }
      .dark .neu-btn:active {
        box-shadow: inset 2px 2px 5px #1e2030, inset -2px -2px 5px #36394c;
      }

      /* Primary button */
      .neu-btn-primary {
        background: linear-gradient(145deg, #eaf0f8, #d1d6de);
        color: #DC143C;
        border-radius: 9999px;
        box-shadow: 5px 5px 10px #b8bcc4, -5px -5px 10px #f0f5fc;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        border: none;
      }
      .dark .neu-btn-primary {
        background: linear-gradient(145deg, #313446, #232536);
        color: #E8556D;
        box-shadow: 5px 5px 10px #1e2030, -5px -5px 10px #36394c;
      }
      .neu-btn-primary:hover {
        transform: scale(1.04);
      }
      .dark .neu-btn-primary:hover {
        transform: scale(1.04);
      }
      .neu-btn-primary:active {
        transform: scale(0.97);
        box-shadow: inset 2px 2px 5px #b8bcc4, inset -2px -2px 5px #f0f5fc;
        transition-duration: 0.1s;
      }
      .dark .neu-btn-primary:active {
        box-shadow: inset 2px 2px 5px #1e2030, inset -2px -2px 5px #36394c;
      }

      /* Danger button */
      .neu-btn-danger {
        background: linear-gradient(145deg, #eaf0f8, #d1d6de);
        color: #B91C1C;
        border-radius: 9999px;
        box-shadow: 5px 5px 10px #b8bcc4, -5px -5px 10px #f0f5fc;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        border: none;
      }
      .dark .neu-btn-danger {
        background: linear-gradient(145deg, #313446, #232536);
        color: #E8556D;
        box-shadow: 5px 5px 10px #1e2030, -5px -5px 10px #36394c;
      }
      .neu-btn-danger:hover { transform: scale(1.04); }
      .neu-btn-danger:active {
        transform: scale(0.97);
        box-shadow: inset 2px 2px 5px #b8bcc4, inset -2px -2px 5px #f0f5fc;
        transition-duration: 0.1s;
      }
      .dark .neu-btn-danger:active {
        box-shadow: inset 2px 2px 5px #1e2030, inset -2px -2px 5px #36394c;
      }

      /* Delete icon button */
      .del-btn {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), color 0.2s ease;
      }
      .del-btn:hover { transform: scale(1.15); color: #DC143C; }
      .del-btn:active { transform: scale(0.9); transition-duration: 0.08s; }

      /* Row hover */
      .row-hover {
        transition: background-color 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .row-hover:hover {
        background-color: rgba(0,0,0,0.015);
      }
      .dark .row-hover:hover {
        background-color: rgba(255,255,255,0.02);
      }

      /* FAB — prominent floating action button */
      .neu-fab {
        background: linear-gradient(145deg, #f0f5fc, #d1d6de);
        border-radius: 9999px;
        box-shadow: 6px 6px 14px #b8bcc4, -6px -6px 14px #f0f5fc, inset 0 1px 0 rgba(255,255,255,0.3);
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        border: none;
        will-change: transform;
        -webkit-transform: translateZ(0);
        transform: translateZ(0);
      }
      .dark .neu-fab {
        background: linear-gradient(145deg, #36394c, #232536);
        box-shadow: 6px 6px 14px #181a2a, -6px -6px 14px #3c3f52, inset 0 1px 0 rgba(255,255,255,0.04);
      }
      .neu-fab:hover { transform: scale(1.06); }
      .neu-fab:active {
        transform: scale(0.94);
        box-shadow: inset 3px 3px 6px #b8bcc4, inset -3px -3px 6px #f0f5fc;
        transition-duration: 0.1s;
      }
      .dark .neu-fab:active {
        box-shadow: inset 3px 3px 6px #181a2a, inset -3px -3px 6px #3c3f52;
      }

      /* Neumorphic pill badge */
      .neu-pill {
        background: #e0e5ec;
        border-radius: 9999px;
        box-shadow: 2px 2px 4px #b8bcc4, -2px -2px 4px #f0f5fc;
      }
      .dark .neu-pill {
        background: #2a2d3e;
        box-shadow: 2px 2px 4px #1e2030, -2px -2px 4px #36394c;
      }

      /* ── Flatpickr ── */
      .flatpickr-calendar, .flatpickr-calendar *, .flatpickr-days, .dayContainer { box-sizing: border-box !important; }
      .flatpickr-calendar {
        font-family: 'Assistant', sans-serif;
        border-radius: 1.5rem !important;
        box-shadow: 5px 5px 12px #b8bcc4, -5px -5px 12px #f0f5fc !important;
        border: none !important;
        padding: 4px !important;
        background: #e0e5ec !important;
        margin-top: 4px;
        width: 290px !important;
        font-size: 13px !important;
      }
      .flatpickr-innerContainer { width: 100% !important; display: flex !important; justify-content: center !important; }
      .flatpickr-rContainer { width: 280px !important; display: flex !important; flex-direction: column !important; align-items: center !important; }
      .flatpickr-days, .dayContainer { width: 280px !important; min-width: 280px !important; max-width: 280px !important; height: auto !important; min-height: 0 !important; justify-content: flex-start !important; }
      @media (min-width: 640px) {
        .flatpickr-calendar { padding: 0.75rem !important; width: 315px !important; font-size: 14px !important; }
        .flatpickr-days, .dayContainer { width: 300px !important; min-width: 300px !important; max-width: 300px !important; }
      }
      .dark .flatpickr-calendar {
        background: #2a2d3e !important;
        box-shadow: 5px 5px 12px #1e2030, -5px -5px 12px #36394c !important;
      }
      .flatpickr-day { max-width: 36px !important; height: 36px !important; line-height: 36px !important; border-radius: 50% !important; margin: 2px !important; }
      @media (min-width: 640px) { .flatpickr-day { max-width: 39px !important; height: 39px !important; line-height: 39px !important; } }
      .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange {
        background: #334155 !important; border-color: #334155 !important; color: #fff !important;
        box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2), inset -1px -1px 2px rgba(255,255,255,0.05) !important;
      }
      .dark .flatpickr-day.selected { background: #DC143C !important; border-color: #DC143C !important; }
      .flatpickr-day:hover { background: #d1d6de !important; }
      .dark .flatpickr-day:not(.flatpickr-disabled):hover { background: #36394c !important; }
      .dark .flatpickr-day:not(.flatpickr-disabled), .dark .flatpickr-weekday, .dark .flatpickr-month, .dark .flatpickr-current-month, .dark .flatpickr-monthDropdown-months { color: #e2e8f0 !important; }
      .dark .flatpickr-day.flatpickr-disabled { color: rgba(255,255,255,0.15) !important; }
      .dark .flatpickr-prev-month, .dark .flatpickr-next-month { fill: #e2e8f0 !important; }
      .flatpickr-time { border-top: 1px solid #c8cdd6 !important; margin-top: 0.25rem !important; height: 35px !important; line-height: 35px !important; }
      @media (min-width: 640px) { .flatpickr-time { height: 40px !important; line-height: 40px !important; margin-top: 0.5rem !important; } }
      .dark .flatpickr-time { border-top-color: #36394c !important; }
      .dark .flatpickr-time input, .dark .flatpickr-time .flatpickr-am-pm { color: #e2e8f0 !important; }
      .flatpickr-time input:hover, .flatpickr-time .flatpickr-am-pm:hover { background: #d1d6de !important; border-radius: 0.5rem !important; }
      .dark .flatpickr-time input:hover, .dark .flatpickr-time .flatpickr-am-pm:hover { background: #36394c !important; }
      .flatpickr-months .flatpickr-month { height: 30px !important; }
      @media (min-width: 640px) { .flatpickr-months .flatpickr-month { height: 35px !important; } }
      .flatpickr-innerContainer { margin-top: 2px; }
      @media (min-width: 640px) { .flatpickr-innerContainer { margin-top: 5px; } }
      .flatpickr-weekdayContainer { display: flex !important; justify-content: space-around !important; }
      .flatpickr-weekday { font-size: 11px !important; }
      .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { display: none !important; }
      input[type="time"] { -webkit-appearance: none; appearance: none; min-width: 0; }
      input[type="time"]::-webkit-date-and-time-value { text-align: center; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body class="transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
